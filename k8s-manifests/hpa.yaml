# Horizontal Pod Autoscaler for all MCT modules
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mct-auth-hpa
  namespace: inthewild
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mct-auth
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
